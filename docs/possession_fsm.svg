<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 770" width="1240" height="770" font-family="DejaVu Sans, Arial, sans-serif">
<rect width="1240" height="770" fill="white"/>
<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 z" fill="#475569"/></marker></defs>
<text x="620.0" y="34" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" fill="#0f172a" font-weight="bold" text-anchor="middle">Máquina de estados del resolver de posesión</text>
<text x="620.0" y="56" font-family="DejaVu Sans, Arial, sans-serif" font-size="12.5" fill="#475569" font-weight="normal" text-anchor="middle" font-style="italic">pipeline/possession/resolver.py — razona por track_id; el % por equipo se deriva después</text>
<rect x="36" y="90" width="330" height="470" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="1.8" stroke-dasharray="6 4"/>
<text x="201.0" y="116" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="bold" text-anchor="middle">Candidato c del frame</text>
<text x="201.0" y="134" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#475569" font-weight="normal" text-anchor="middle" font-style="italic">(_frame_candidate, en espacio imagen)</text>
<rect x="54" y="152" width="294" height="92" rx="9" fill="#fffbeb" stroke="#d97706" stroke-width="1.8"/>
<text x="201.0" y="174" font-family="DejaVu Sans, Arial, sans-serif" font-size="12.5" fill="#92400e" font-weight="bold" text-anchor="middle">1 · Señal primaria</text>
<text x="201.0" y="194" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">detección clase-5 (player-in-possession)</text><text x="201.0" y="209" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">asociada por IoU ≥ class5_iou,</text><text x="201.0" y="224" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">con balón cerca (si class5_requires_ball)</text>
<rect x="54" y="256" width="294" height="118" rx="9" fill="#eff6ff" stroke="#2563eb" stroke-width="1.8"/>
<text x="201.0" y="278" font-family="DejaVu Sans, Arial, sans-serif" font-size="12.5" fill="#1e3a8a" font-weight="bold" text-anchor="middle">2 · Señal secundaria (proximidad)</text>
<text x="201.0" y="298" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">dist. borde balón→bbox / altura</text><text x="201.0" y="313" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">≤ max_ball_distance_heights;</text><text x="201.0" y="328" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">supresión cerca del aro;</text><text x="201.0" y="343" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">filtro de balón en vuelo (velocidad)</text>
<rect x="54" y="386" width="294" height="92" rx="9" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/>
<text x="201.0" y="408" font-family="DejaVu Sans, Arial, sans-serif" font-size="12.5" fill="#166534" font-weight="bold" text-anchor="middle">3 · Desempate P3 (forcejeo)</text>
<text x="201.0" y="428" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">(a) poseedor / último poseedor</text><text x="201.0" y="443" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">(b) coincidencia de movimiento</text><text x="201.0" y="458" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">(c) el más cercano</text>
<text x="201.0" y="500" font-family="DejaVu Sans, Arial, sans-serif" font-size="13" fill="#0f172a" font-weight="bold" text-anchor="middle">⇒  c = track_id   ó   c = None</text>
<text x="201.0" y="522" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#475569" font-weight="normal" text-anchor="middle" font-style="italic">(balón suelto / ningún candidato válido)</text>
<rect x="630.0" y="152.0" width="320" height="96" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/><text x="790" y="194" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#1e3a8a" font-weight="bold" text-anchor="middle">POSEEDOR = T</text><text x="790" y="216" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle" font-style="italic">_possessor = T  (estable)</text>
<rect x="920.0" y="362.0" width="250" height="96" rx="14" fill="#fffbeb" stroke="#d97706" stroke-width="2.5"/><text x="1045" y="404" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#92400e" font-weight="bold" text-anchor="middle">PENDIENTE → T′</text><text x="1045" y="426" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle" font-style="italic">histéresis: pend_count</text>
<rect x="630.0" y="552.0" width="320" height="96" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/><text x="790" y="594" font-family="DejaVu Sans, Arial, sans-serif" font-size="16" fill="#991b1b" font-weight="bold" text-anchor="middle">SIN POSEEDOR</text><text x="790" y="616" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle" font-style="italic">_possessor = None  (suelto)</text>
<path d="M 366 315 C 470 315, 520 320, 600 280" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="470" y="300" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle" font-style="italic">candidato c</text>
<path d="M 935 225 C 1000 270, 1010 320, 1020 362" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="1030" y="280" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="start">c = T′ ≠ T</text><text x="1030" y="295" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="start">(pend = 1)</text>
<path d="M 940 388 C 870 330, 850 290, 845 250" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="770" y="330" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle">c = T′ ×switch_frames ⇒ poseedor := T′</text><text x="770" y="345" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle">c = T ⇒ cancela (vuelve a T)</text>
<path d="M 730 248 C 690 360, 690 440, 720 552" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="636" y="400" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle">c = None</text><text x="636" y="415" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle">×loose_frames</text><text x="636" y="430" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle">⇒ suelto</text>
<path d="M 850 552 C 890 440, 890 360, 850 248" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="790" y="468" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle">c = último poseedor</text><text x="790" y="483" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="middle">⇒ recupera (1 frame)</text>
<path d="M 950 588 C 1020 540, 1050 500, 1060 460" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="1090" y="545" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="start">c = candidato</text><text x="1090" y="560" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" fill="#475569" font-weight="normal" text-anchor="start">nuevo (pend = 1)</text>
<path d="M 720 152 C 705 108, 875 108, 858 152" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="790" y="100" font-family="DejaVu Sans, Arial, sans-serif" font-size="11.5" fill="#475569" font-weight="normal" text-anchor="middle">c = T (se mantiene)</text>
<path d="M 1170 392 C 1216 370, 1216 434, 1172 430" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="1206" y="402" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">c = T′</text><text x="1206" y="417" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" fill="#475569" font-weight="normal" text-anchor="middle">(pend++)</text>
<path d="M 720 648 C 705 692, 875 692, 858 648" fill="none" stroke="#475569" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="790" y="712" font-family="DejaVu Sans, Arial, sans-serif" font-size="11.5" fill="#475569" font-weight="normal" text-anchor="middle">c = None (se mantiene)</text>
<text x="1220" y="754" font-family="DejaVu Sans, Arial, sans-serif" font-size="10.5" fill="#475569" font-weight="normal" text-anchor="end" font-style="italic">T = poseedor actual · T′ = candidato distinto · switch_frames, loose_frames = umbrales de histéresis (PossessionSettings)</text>
</svg>