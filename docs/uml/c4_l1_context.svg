<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#004379"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#004379">Basketball Play Visualizer — C4 Nivel 1: Contexto del sistema</text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#595959">Visión general de actores y sistemas externos</text>

  <!-- ===== Relationships (drawn first, under boxes) ===== -->
  <!-- Coach -> System -->
  <line x1="205" y1="300" x2="335" y2="300" stroke="#004379" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="270" y="288" text-anchor="middle" font-size="11" fill="#595959">Sube vídeo,</text>
  <text x="270" y="301" text-anchor="middle" font-size="11" fill="#595959">consulta análisis</text>
  <text x="270" y="320" text-anchor="middle" font-size="10" fill="#2E74B5" font-style="italic">[HTTPS / REST · navegador]</text>

  <!-- System -> Hugging Face -->
  <line x1="575" y1="270" x2="675" y2="165" stroke="#004379" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="640" y="222" text-anchor="middle" font-size="10" fill="#595959">Carga modelos</text>
  <text x="640" y="234" text-anchor="middle" font-size="10" fill="#595959">preentrenados</text>

  <!-- System -> Roboflow -->
  <line x1="575" y1="300" x2="675" y2="300" stroke="#004379" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="625" y="293" text-anchor="middle" font-size="10" fill="#595959">Dataset</text>
  <text x="625" y="305" text-anchor="middle" font-size="10" fill="#595959">RF-DETR</text>

  <!-- System -> GPU Server -->
  <line x1="575" y1="330" x2="675" y2="435" stroke="#004379" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="640" y="368" text-anchor="middle" font-size="10" fill="#595959">Inferencia ML</text>
  <text x="640" y="380" text-anchor="middle" font-size="10" fill="#595959">(PyTorch / CUDA)</text>

  <!-- ===== Person: Coach / Analyst ===== -->
  <g>
    <rect x="55" y="240" width="150" height="120" rx="4" fill="#004379" stroke="#002b50" stroke-width="1.5"/>
    <circle cx="130" cy="278" r="16" fill="#D9E2F3"/>
    <path d="M104,322 a26,22 0 0 1 52,0 Z" fill="#D9E2F3"/>
    <text x="130" y="344" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Entrenador /</text>
    <text x="130" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Analista</text>
  </g>

  <!-- ===== Central System ===== -->
  <rect x="335" y="230" width="240" height="140" rx="4" fill="#D9E2F3" stroke="#004379" stroke-width="2"/>
  <text x="455" y="278" text-anchor="middle" font-size="16" font-weight="bold" fill="#004379">Basketball Play</text>
  <text x="455" y="298" text-anchor="middle" font-size="16" font-weight="bold" fill="#004379">Visualizer</text>
  <text x="455" y="322" text-anchor="middle" font-size="11" fill="#595959">[Sistema software]</text>
  <text x="455" y="344" text-anchor="middle" font-size="11" fill="#595959">Análisis táctico de vídeo de</text>
  <text x="455" y="358" text-anchor="middle" font-size="11" fill="#595959">baloncesto con visión por computador</text>

  <!-- ===== External: Hugging Face ===== -->
  <rect x="675" y="115" width="200" height="100" rx="4" fill="#ffffff" stroke="#2E74B5" stroke-width="1.6" stroke-dasharray="6,4"/>
  <text x="775" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#004379">Hugging Face</text>
  <text x="775" y="168" text-anchor="middle" font-size="11" fill="#595959">[Sistema externo]</text>
  <text x="775" y="188" text-anchor="middle" font-size="11" fill="#595959">Model hub: SmolVLM2,</text>
  <text x="775" y="202" text-anchor="middle" font-size="11" fill="#595959">SigLIP, SAM 3</text>

  <!-- ===== External: Roboflow ===== -->
  <rect x="675" y="250" width="200" height="100" rx="4" fill="#ffffff" stroke="#2E74B5" stroke-width="1.6" stroke-dasharray="6,4"/>
  <text x="775" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#004379">Roboflow</text>
  <text x="775" y="303" text-anchor="middle" font-size="11" fill="#595959">[Sistema externo]</text>
  <text x="775" y="323" text-anchor="middle" font-size="11" fill="#595959">Servicio cloud de</text>
  <text x="775" y="337" text-anchor="middle" font-size="11" fill="#595959">datasets anotados</text>

  <!-- ===== External: GPU Server ===== -->
  <rect x="675" y="385" width="200" height="100" rx="4" fill="#ffffff" stroke="#2E74B5" stroke-width="1.6" stroke-dasharray="6,4"/>
  <text x="775" y="420" text-anchor="middle" font-size="14" font-weight="bold" fill="#004379">Servidor GPU / CUDA</text>
  <text x="775" y="438" text-anchor="middle" font-size="11" fill="#595959">[Sistema externo]</text>
  <text x="775" y="458" text-anchor="middle" font-size="11" fill="#595959">Servidor institucional</text>
  <text x="775" y="472" text-anchor="middle" font-size="11" fill="#595959">2× NVIDIA A100 40GB</text>

  <!-- ===== Legend ===== -->
  <rect x="55" y="500" width="790" height="70" rx="4" fill="#F2F2F2" stroke="#bfbfbf" stroke-width="1"/>
  <text x="70" y="520" font-size="12" font-weight="bold" fill="#004379">Leyenda</text>
  <!-- person -->
  <rect x="70" y="532" width="26" height="20" rx="4" fill="#004379"/>
  <text x="104" y="547" font-size="11" fill="#595959">Persona / actor</text>
  <!-- system -->
  <rect x="225" y="532" width="26" height="20" rx="4" fill="#D9E2F3" stroke="#004379" stroke-width="1.5"/>
  <text x="259" y="547" font-size="11" fill="#595959">Sistema en estudio</text>
  <!-- external -->
  <rect x="420" y="532" width="26" height="20" rx="4" fill="#ffffff" stroke="#2E74B5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="454" y="547" font-size="11" fill="#595959">Sistema externo</text>
  <!-- relation -->
  <line x1="600" y1="542" x2="640" y2="542" stroke="#004379" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="650" y="547" font-size="11" fill="#595959">Relación / flujo de datos</text>
</svg>
