# =============================================================================
# Capa CONDA del entorno reproducible del TFG "Análisis de Baloncesto Inteligente"
# -----------------------------------------------------------------------------
# Solo paquetes conda (Python, CUDA 11.8, MKL, ffmpeg, nodejs, libs de sistema).
# Los paquetes pip se instalan APARTE desde requirements-lock.txt con --no-deps
# (ver tfg.def), porque el entorno real contiene combinaciones que violan los
# metadatos de algún wheel (p. ej. opencv-python 4.13 declara numpy>=2 pero el
# entorno usa numpy 1.26.4): el resolutor estricto de pip las rechaza, así que se
# reproduce el conjunto exacto ya validado saltando la resolución.
#
# Export FIEL del entorno conda real `tfg-baloncesto` (2026-06-21):
#   conda env export --no-builds   (sección conda)
# Artefacto de despliegue AISLADO: no afecta a requirements.txt ni al pipeline.
# =============================================================================
name: tfg-baloncesto
channels:
  - defaults
  - conda-forge
  - nvidia
  - pytorch
